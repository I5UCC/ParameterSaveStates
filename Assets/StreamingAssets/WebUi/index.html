<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Parameter Save States</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    };
  </script>
</head>
<body class="min-h-screen bg-white text-slate-950 dark:bg-slate-950 dark:text-slate-100 transition-colors">
  <div class="mx-auto w-full max-w-5xl px-5 py-6">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
      <h1 class="text-2xl font-semibold">Parameter Save States</h1>
      <div class="flex items-center gap-3">
        <button id="themToggle" class="rounded-lg border border-slate-300 bg-slate-100 px-2 py-1.5 text-xs font-semibold text-slate-900 transition hover:bg-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700">
          🌙 Dark
        </button>
      </div>
    </div>

    <div id="status" class="mb-4 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 dark:border-slate-800 dark:bg-slate-900/80 dark:text-slate-100">
      Loading...
    </div>

    <div class="mb-4 rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-900/70">
      <div class="flex flex-wrap items-center gap-3 text-sm">
        <span class="min-w-[140px] text-slate-600 dark:text-slate-400">Current Avatar</span>
        <span id="currentAvatar" class="text-slate-900 dark:text-slate-200">-</span>
      </div>
      <div class="mt-2 flex flex-wrap items-center gap-3 text-sm">
        <span class="min-w-[140px] text-slate-600 dark:text-slate-400">Previous Avatar</span>
        <span id="previousAvatar" class="text-slate-900 dark:text-slate-200">-</span>
      </div>
      <div class="mt-2 flex flex-wrap items-center gap-3 text-sm">
        <span class="min-w-[140px] text-slate-600 dark:text-slate-400">Connection</span>
        <span id="connectionState" class="text-slate-900 dark:text-slate-200">-</span>
      </div>
    </div>

    <div class="mb-4 rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-900/70">
      <label for="copyFromAvatarSelect" class="text-sm font-semibold text-slate-900 dark:text-slate-200">Profile Management</label>
      <div class="mt-3 flex flex-wrap items-center gap-3">
        <select
          id="copyFromAvatarSelect"
          class="flex-1 min-w-[280px] rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100"
        ></select>
        <button id="copyFromAvatarBtn" class="rounded-lg border border-slate-300 bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-900 transition hover:bg-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-300 disabled:cursor-not-allowed disabled:opacity-60 dark:border-slate-700 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600 dark:focus:ring-slate-400">
          Copy from selected avatar
        </button>
        <button id="deleteAvatarFolderBtn" class="rounded-lg bg-rose-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-400 focus:outline-none focus:ring-2 focus:ring-rose-400 disabled:cursor-not-allowed disabled:opacity-60">
          Delete selected avatar folder
        </button>
      </div>
    </div>

    <div class="mb-4 rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-900/70">
      <label for="newProfileInput" class="text-sm font-semibold text-slate-900 dark:text-slate-200">Profile Creation</label>
      <div class="mt-3 flex flex-wrap items-center gap-3">
        <input
          id="newProfileInput"
          type="text"
          placeholder="Profile name (optional)"
          class="flex-1 min-w-[220px] rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100"
        />
        <button id="saveProfileBtn" class="rounded-lg bg-sky-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-400 dark:hover:bg-sky-400">
          Save New
        </button>
      </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-900/70">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <h2 class="text-lg font-semibold">Profiles</h2>
        <button id="refreshBtn" class="rounded-lg border border-slate-300 bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-900 transition hover:bg-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-300 dark:border-slate-700 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600 dark:focus:ring-slate-400">
          Refresh
        </button>
      </div>
      <div id="profiles" class="mt-4 flex flex-col gap-2"></div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const currentAvatarEl = document.getElementById("currentAvatar");
    const previousAvatarEl = document.getElementById("previousAvatar");
    const connectionStateEl = document.getElementById("connectionState");
    const profilesEl = document.getElementById("profiles");
    const newProfileInput = document.getElementById("newProfileInput");
    const copyFromAvatarSelect = document.getElementById("copyFromAvatarSelect");

    const refreshBtn = document.getElementById("refreshBtn");
    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const copyFromAvatarBtn = document.getElementById("copyFromAvatarBtn");
    const deleteAvatarFolderBtn = document.getElementById("deleteAvatarFolderBtn");
    const themeToggle = document.getElementById("themToggle");

    function applyTheme(theme) {
      const normalized = theme === "light" ? "light" : "dark";
      if (normalized === "light") {
        document.documentElement.classList.remove("dark");
        themeToggle.textContent = "☀️ Light";
      } else {
        document.documentElement.classList.add("dark");
        themeToggle.textContent = "🌙 Dark";
      }
      return normalized;
    }

    async function loadTheme() {
      try {
        const data = await api("/api/theme");
        const normalized = applyTheme(data.theme);
        localStorage.setItem("theme", normalized);
      } catch (error) {
        console.warn("Failed to load theme from server:", error);
        const savedTheme = localStorage.getItem("theme") || "dark";
        applyTheme(savedTheme);
      }
    }

    async function saveTheme(theme) {
      try {
        await api("/api/theme", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ theme })
        });
      } catch (error) {
        console.warn("Failed to save theme to server:", error);
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.contains("dark");
      const nextTheme = isDark ? "light" : "dark";
      const normalized = applyTheme(nextTheme);
      localStorage.setItem("theme", normalized);
      saveTheme(normalized);
    }

    themeToggle.addEventListener("click", toggleTheme);
    loadTheme();
    const statusBaseClasses = "mb-4 rounded-lg border px-4 py-3 text-sm";
    const statusOkClasses = "border-slate-200 bg-slate-50 text-slate-900 dark:border-slate-800 dark:bg-slate-900/80 dark:text-slate-100";
    const statusErrorClasses = "border-rose-300 bg-rose-50 text-rose-900 dark:border-rose-500/60 dark:bg-rose-950/40 dark:text-rose-100";
    const buttonBaseClasses = "rounded-lg px-3 py-2 text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-950 disabled:cursor-not-allowed disabled:opacity-60";
    const buttonVariants = {
      primary: "bg-sky-500 text-white hover:bg-sky-400 focus:ring-sky-400",
      secondary: "bg-slate-700 text-slate-100 hover:bg-slate-600 focus:ring-slate-400",
      danger: "bg-rose-500 text-white hover:bg-rose-400 focus:ring-rose-400"
    };

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.className = `${statusBaseClasses} ${isError ? statusErrorClasses : statusOkClasses}`;
    }

    async function api(path, options) {
      const finalOptions = Object.assign({ cache: "no-store" }, options || {});
      const response = await fetch(path, finalOptions);
      const payload = await response.json();
      if (!payload.ok) {
        throw new Error(payload.error || "Request failed");
      }
      return payload.data;
    }

    function formatAvatarDisplay(id, name) {
      if (!id) {
        return "-";
      }
      if (name && name.trim().length > 0) {
        return `${name} (${id})`;
      }
      return id;
    }

    let statusPollTimer = null;

    let eventSource = null;

    async function loadStatus() {
      if (statusPollTimer) {
        clearTimeout(statusPollTimer);
        statusPollTimer = null;
      }
      try {
        const data = await api("/api/status");
        currentAvatarEl.textContent = formatAvatarDisplay(data.currentAvatar, data.avatarName);
        previousAvatarEl.textContent = formatAvatarDisplay(data.previousAvatar, data.previousAvatarName);
        connectionStateEl.textContent = data.connected ? "Connected" : "Waiting for VRChat";
        renderProfiles(data.profiles || []);
        setStatus(data.connected ? "Ready" : "Waiting for VRChat to connect...", false);
        
        if (!data.connected || !data.currentAvatar) {
          statusPollTimer = setTimeout(loadStatus, 2000);
          if (eventSource) {
            eventSource.close();
            eventSource = null;
          }
        } else if (!eventSource) {
          eventSource = new EventSource("/api/events");
          eventSource.onmessage = () => {
            loadStatus();
          };
          eventSource.onerror = () => {
            eventSource.close();
            eventSource = null;
            statusPollTimer = setTimeout(loadStatus, 2000);
          };
        }
      } catch (error) {
        setStatus(error.message, true);
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        statusPollTimer = setTimeout(loadStatus, 2000);
      }
    }

    function avatarDisplayName(avatar) {
      if (avatar.avatarName && avatar.avatarName.trim().length > 0) {
        return `${avatar.avatarName} (${avatar.avatarId})`;
      }
      return avatar.avatarId;
    }

    async function loadCopySourceAvatars() {
      const previousSelection = copyFromAvatarSelect.value;
      try {
        const data = await api("/api/avatars/with-profiles");
        const avatars = data.avatars || [];
        copyFromAvatarSelect.innerHTML = "";

        if (!avatars.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "No avatars with saved profiles";
          copyFromAvatarSelect.appendChild(option);
          copyFromAvatarSelect.disabled = true;
          copyFromAvatarBtn.disabled = true;
          deleteAvatarFolderBtn.disabled = true;
          return;
        }

        avatars.forEach((avatar) => {
          const option = document.createElement("option");
          option.value = avatar.avatarId;
          option.textContent = avatarDisplayName(avatar);
          copyFromAvatarSelect.appendChild(option);
        });

        const hasPreviousSelection = avatars.some((avatar) => avatar.avatarId === previousSelection);
        copyFromAvatarSelect.value = hasPreviousSelection ? previousSelection : avatars[0].avatarId;
        copyFromAvatarSelect.disabled = false;
        copyFromAvatarBtn.disabled = false;
        deleteAvatarFolderBtn.disabled = false;
      } catch (error) {
        copyFromAvatarSelect.innerHTML = "";
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "Unable to load avatars";
        copyFromAvatarSelect.appendChild(option);
        copyFromAvatarSelect.disabled = true;
        copyFromAvatarBtn.disabled = true;
        deleteAvatarFolderBtn.disabled = true;
      }
    }

    function renderProfiles(profiles) {
      profilesEl.innerHTML = "";
      if (!profiles.length) {
        const empty = document.createElement("div");
        empty.className = "text-sm text-slate-500 dark:text-slate-400";
        empty.textContent = "No profiles found.";
        profilesEl.appendChild(empty);
        return;
      }

      profiles.forEach((name, index) => {
        const row = document.createElement("div");
        row.className = "flex flex-wrap items-center gap-2 rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 dark:border-slate-800 dark:bg-slate-900/60";

        const label = document.createElement("span");
        label.className = "flex-1 text-sm font-semibold text-slate-900 dark:text-slate-100";
        label.textContent = name;

        const moveUpBtn = createButton("↑", (e, btn) => runProfileAction("/api/profiles/move", { name, direction: "up" }, btn), "secondary");
        moveUpBtn.disabled = index === 0;
        const moveDownBtn = createButton("↓", (e, btn) => runProfileAction("/api/profiles/move", { name, direction: "down" }, btn), "secondary");
        moveDownBtn.disabled = index === profiles.length - 1;
        const applyBtn = createButton("Apply", (e, btn) => runProfileAction("/api/profiles/apply", { name }, btn), "primary");
        const overrideBtn = createButton("Override", (e, btn) => confirmAction(
          "Override this profile with current parameters?",
          () => runProfileAction("/api/profiles/override", { name }, btn)
        ), "secondary");
        const renameBtn = createButton("Rename", (e, btn) => {
          const newName = prompt("Enter new profile name:", name);
          if (newName && newName.trim()) {
            runProfileAction("/api/profiles/rename", { name, newName: newName.trim() }, btn);
          }
        }, "secondary");
        const deleteBtn = createButton("Delete", (e, btn) => confirmAction(
          "Delete this profile?",
          () => runProfileAction("/api/profiles/delete", { name }, btn)
        ), "danger");

        row.appendChild(label);
        row.appendChild(moveUpBtn);
        row.appendChild(moveDownBtn);
        row.appendChild(applyBtn);
        row.appendChild(overrideBtn);
        row.appendChild(renameBtn);
        row.appendChild(deleteBtn);
        profilesEl.appendChild(row);
      });
    }

    function createButton(label, handler, variant) {
      const button = document.createElement("button");
      button.textContent = label;
      const classes = `${buttonBaseClasses} ${buttonVariants[variant || "primary"] || buttonVariants.primary}`;
      button.className = classes;
      button.addEventListener("click", (e) => handler(e, button));
      return button;
    }

    function confirmAction(message, action) {
      if (confirm(message)) {
        action();
      }
    }

    async function runProfileAction(path, body, button = null) {
      const originalHtml = button ? button.innerHTML : "";
      if (button) {
        button.disabled = true;
        button.innerHTML = `<span class="flex items-center justify-center"><svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-current" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>${button.textContent}</span>`;
      }
      try {
        await api(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body || {})
        });
        await loadStatus();
        await loadCopySourceAvatars();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        if (button) {
          button.disabled = false;
          button.innerHTML = originalHtml;
        }
      }
    }

    refreshBtn.addEventListener("click", loadStatus);
    saveProfileBtn.addEventListener("click", async () => {
      await runProfileAction("/api/profiles/save", { name: newProfileInput.value }, saveProfileBtn);
      newProfileInput.value = "";
    });
    copyFromAvatarBtn.addEventListener("click", () => {
      const avatarId = copyFromAvatarSelect.value;
      if (!avatarId) {
        setStatus("Select an avatar to copy from.", true);
        return;
      }
      runProfileAction("/api/profiles/copy-from-avatar", { avatarId }, copyFromAvatarBtn);
    });
    deleteAvatarFolderBtn.addEventListener("click", () => {
      const avatarId = copyFromAvatarSelect.value;
      if (!avatarId) {
        setStatus("Select an avatar to delete.", true);
        return;
      }

      confirmAction(
        "Delete all profiles for the selected avatar? This cannot be undone.",
        () => runProfileAction("/api/profiles/delete-avatar-folder", { avatarId }, deleteAvatarFolderBtn)
      );
    });
    loadCopySourceAvatars();
    loadStatus();
  </script>
</body>
</html>
